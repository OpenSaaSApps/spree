services:
  app:
    image: ghcr.io/spree/spree:latest
    container_name: spree
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DATABASE_URL=${{DATABASE_URL}}
      - REDIS_URL=${{REDIS_URL}}
      - SECRET_KEY_BASE=${{SECRET_KEY_BASE}}
      - RAILS_FORCE_SSL=${{RAILS_FORCE_SSL}}
      - MEILISEARCH_URL=${{MEILISEARCH_URL}}
    volumes:
      - app_data:/data
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: spree
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spree}
      POSTGRES_DB: spree
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal

  meilisearch:
    image: getmeili/meilisearch:latest
    restart: unless-stopped
    volumes:
      - meili_data:/meili_data
    networks:
      - internal

volumes:
  postgres_data:
  meili_data:
volumes:
  app_data:

networks:
  internal:
